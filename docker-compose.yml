services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-interview}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-interview}
      PIPELINE_INTERVAL: ${PIPELINE_INTERVAL:-30}
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      # Preserve the container's .venv — do not overwrite with host's
      - /app/.venv
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn src.api.app:app --host 0.0.0.0 --port 8000 --reload
    # Alternative: use `docker compose watch` (Compose 2.22.0+)
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
          ignore:
            - __pycache__/
            - "*.pyc"
        - action: rebuild
          path: ./pyproject.toml
        - action: rebuild
          path: ./uv.lock

volumes:
  postgres_data:
